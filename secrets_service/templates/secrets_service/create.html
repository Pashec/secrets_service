<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать одноразовый секрет</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-[#1e293b] rounded-2xl shadow-2xl border border-slate-700/50 p-8 space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">
                 Одноразовый секрет
            </h1>
            <p class="text-sm text-slate-400">
                Напишите секрет и отправьте ссылку другу. После прочтения она сгорит навсегда.
            </p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div class="space-y-1">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Ваш секрет</label>
                <textarea name="text" rows="4" required 
                    class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 resize-none transition"
                    placeholder="Введите Ваш секрет или что-то, чем хотите поделиться с другом..."></textarea>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Пароль для защиты (опционально)</label>
                <input type="password" name="password" 
                    class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition"
                    placeholder="Оставьте пустым, если не нужен">
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-900/30 transition transform active:scale-[0.98] cursor-pointer text-center">
                Создать секретную ссылку
            </button>
        </form>
    </div>

</body>
</html>
