<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секрет защищен</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-[#1e293b] rounded-2xl shadow-2xl border border-slate-700/50 p-8 space-y-6 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-amber-500/10 text-amber-400 text-3xl mb-2">
            
        </div>

        <div class="space-y-2">
            <h1 class="text-2xl font-bold text-slate-100">Этот секрет защищен паролем</h1>
            <p class="text-sm text-slate-400">Введите ключ доступа, чтобы расшифровать и прочитать сообщение.</p>
        </div>

        {% if error %}
            <div class="bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm py-2.5 px-4 rounded-xl font-medium">
                 {{ error }}
            </div>
        {% endif %}

        <form method="POST" class="space-y-4 text-left">
            {% csrf_token %}
            <div class="space-y-1">
                <input type="password" name="password" required
                    class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition"
                    placeholder="Введите пароль">
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-amber-900/30 transition transform active:scale-[0.98] cursor-pointer text-center">
                Открыть секрет
            </button>
        </form>
    </div>

</body>
</html>
