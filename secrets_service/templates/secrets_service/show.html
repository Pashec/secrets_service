<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ваш секрет</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-[#1e293b] rounded-2xl shadow-2xl border border-slate-700/50 p-8 space-y-6">
        <div class="flex items-center gap-3 border-b border-slate-700/50 pb-4">
            <span class="text-2xl"></span>
            <h1 class="text-xl font-bold text-slate-100">Текст секретного сообщения:</h1>
        </div>
        
        <div class="bg-[#0f172a] border-l-4 border-emerald-500 rounded-r-xl p-6 font-mono text-slate-300 shadow-inner overflow-x-auto">
            <pre class="white-space: pre-wrap; font-sans text-base">{{ text }}</pre>
        </div>

        <div class="bg-amber-500/5 border border-amber-500/20 rounded-xl p-4 flex gap-3 items-start">
            <span class="text-xl"></span>
            <p class="text-xs text-amber-400/90 leading-relaxed">
                <strong>Внимание:</strong> Этот секрет уже уничтожен в базе данных. Если вы обновите страницу, вернетесь назад или закроете вкладку — данные исчезнут навсегда, восстановить их невозможно!
            </p>
        </div>
    </div>

</body>
</html>
